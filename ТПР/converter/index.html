<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Конвертер печатного текста в рукописный онлайн бесплатно">
  <title>Handwritten Text Converter — Создай свой конспект</title>
  <!-- Google Fonts for UI and Handwriting -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Caveat:wght@400;700&family=Marck+Script&family=Neucha&family=Bad+Script&family=Kelly+Slab&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <span class="logo-icon">✍️</span>
        <h1 class="app-title">Scripto<span class="highlight">Gold</span></h1>
      </div>
      <p class="app-subtitle">Премиальный инструмент для перевода текста в рукописный вид</p>
    </header>

    <!-- Main Workspace -->
    <main class="app-workspace">
      <!-- Left Panel: Controls -->
      <section class="controls-panel">
        <div class="panel-card">
          <h2 class="card-title">📝 Ввод текста</h2>
          <div class="textarea-wrapper">
            <textarea id="text-input" placeholder="Введите или вставьте сюда текст вашего конспекта..."></textarea>
            <div class="char-count">Символов: <span id="char-total">0</span></div>
          </div>
        </div>

        <div class="panel-card">
          <h2 class="card-title">🎨 Настройки почерка</h2>
          
          <div class="control-group">
            <label for="font-select">Выбор шрифта</label>
            <select id="font-select">
              <option value="Caveat">Caveat (По умолчанию)</option>
              <option value="Marck Script">Marck Script (Аккуратный)</option>
              <option value="Neucha">Neucha (Крупный округлый)</option>
              <option value="Bad Script">Bad Script (Небрежный)</option>
              <option value="Pacifico">Pacifico (Каллиграфический)</option>
              <option value="custom">-- Загрузить свой шрифт (.ttf / .otf) --</option>
            </select>
            <input type="file" id="font-upload" accept=".ttf,.otf,.woff,.woff2" style="display: none;">
            <div id="font-status" class="status-msg"></div>
          </div>

          <div class="control-row">
            <div class="control-group half">
              <label for="font-size">Размер букв</label>
              <div class="range-wrapper">
                <input type="range" id="font-size" min="16" max="32" value="22">
                <span class="range-val" id="font-size-val">22px</span>
              </div>
            </div>
            <div class="control-group half">
              <label for="line-height">Межстрочный интервал</label>
              <div class="range-wrapper">
                <input type="range" id="line-height" min="25" max="50" value="34">
                <span class="range-val" id="line-height-val">34px</span>
              </div>
            </div>
          </div>

          <div class="control-row">
            <div class="control-group half">
              <label for="margin-top">Отступ сверху</label>
              <div class="range-wrapper">
                <input type="range" id="margin-top" min="20" max="150" value="50">
                <span class="range-val" id="margin-top-val">50px</span>
              </div>
            </div>
            <div class="control-group half">
              <label for="margin-left">Отступ слева</label>
              <div class="range-wrapper">
                <input type="range" id="margin-left" min="20" max="120" value="70">
                <span class="range-val" id="margin-left-val">70px</span>
              </div>
            </div>
          </div>

          <div class="control-group">
            <label>Цвет чернил (ручки)</label>
            <div class="color-options">
              <div class="color-swatch active" data-color="#1c3b88" style="background-color: #1c3b88;" title="Синяя паста"></div>
              <div class="color-swatch" data-color="#222222" style="background-color: #222222;" title="Черная паста"></div>
              <div class="color-swatch" data-color="#9a1c1c" style="background-color: #9a1c1c;" title="Красная паста"></div>
              <div class="color-swatch custom-color" title="Свой цвет">
                <input type="color" id="ink-color-picker" value="#1c3b88">
              </div>
            </div>
          </div>
        </div>

        <div class="panel-card">
          <h2 class="card-title">📖 Параметры листа</h2>
          
          <div class="control-group">
            <label for="paper-select">Стиль бумаги</label>
            <select id="paper-select">
              <option value="grid">Тетрадь в клетку</option>
              <option value="lines">Тетрадь в линейку</option>
              <option value="blank">Чистый белый лист</option>
            </select>
          </div>

          <div class="control-group">
            <label>Добавить «живой шум» (искажения)</label>
            <div class="checkbox-group">
              <label class="custom-checkbox">
                <input type="checkbox" id="jitter-incline" checked>
                <span class="checkmark"></span>
                Разный наклон букв (симуляция наклона)
              </label>
              <label class="custom-checkbox">
                <input type="checkbox" id="jitter-size" checked>
                <span class="checkmark"></span>
                Разный размер букв (симуляция нажима)
              </label>
              <label class="custom-checkbox">
                <input type="checkbox" id="jitter-margin" checked>
                <span class="checkmark"></span>
                Неровное начало строки (кривизна полей)
              </label>
            </div>
          </div>
        </div>

        <div class="panel-card action-card">
          <button id="convert-btn" class="primary-btn">✨ Сгенерировать конспект</button>
        </div>
      </section>

      <!-- Right Panel: Live Preview & Export -->
      <section class="preview-panel">
        <div class="preview-header">
          <h2 class="section-title">🖼️ Предпросмотр конспекта</h2>
          <div class="export-actions">
            <button id="download-jpg-btn" class="secondary-btn">💾 Скачать JPG</button>
            <button id="download-pdf-btn" class="secondary-btn gold-btn">📄 Экспорт в PDF</button>
          </div>
        </div>

        <div class="pages-gallery-wrapper">
          <div id="pages-gallery" class="pages-gallery">
            <!-- Canvas pages are dynamically added here -->
            <div class="empty-state">
              <div class="empty-icon">📝</div>
              <p>Введите текст слева и нажмите кнопку генерации для создания конспекта.</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Print Container (used only for PDF export) -->
  <div id="print-container"></div>

  <script src="app.js"></script>
</body>
</html>
